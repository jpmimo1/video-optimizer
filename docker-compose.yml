version: '3.8'

services:
  # 1. Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: video_optimizer_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432" # Exposed for local Prisma CLI access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - video_network

  # 2. Queue Manager (Redis)
  redis:
    image: redis:7-alpine
    container_name: video_optimizer_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - video_network

  # 3. Backend - HTTP API (NestJS)
  nestjs-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video_optimizer_api
    restart: always
    command: sh -c "npx prisma generate && npm run start:dev"
    ports:
      - "4000:4000"
    environment:
      # Constructing URL internally using the "postgres" container name
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - PROCESS_TYPE=API
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    networks:
      - video_network

  # 4. Backend - Processing Worker (NestJS + FFmpeg)
  nestjs-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video_optimizer_worker
    restart: always
    command: sh -c "npx prisma generate && npm run start:dev"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - R2_BUCKET=${R2_BUCKET}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - PROCESS_TYPE=WORKER
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    networks:
      - video_network

  # 5. Frontend (Next.js)
  nextjs-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video_optimizer_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    networks:
      - video_network
    depends_on:
      - nestjs-api

volumes:
  postgres_data:
  redis_data:

networks:
  video_network:
    driver: bridge